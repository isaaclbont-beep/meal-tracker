<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal Tracker Pro 💪</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:15px;}
.container { max-width:520px; margin:auto;}
h1 { text-align:center; }

.card {
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  margin-top:10px;
}

input, select, button {
  width:100%;
  padding:12px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

button { background:#22c55e; font-weight:bold;}

table { width:100%; border-collapse: collapse;}
td, th { padding:8px; border-bottom:1px solid #444; text-align:center;}

.progress { height:10px; background:#333; border-radius:10px;}
.bar { height:100%; background:#22c55e;}

.meal { background:#334155; padding:10px; border-radius:10px; margin-top:5px;}
</style>
</head>

<body>
<div class="container">

<h1>Meal Tracker Pro 💪</h1>

<div class="card">
<h3>Mode & Target</h3>

<select id="mode">
<option value="bulk">Bulking</option>
<option value="cut">Cutting</option>
</select>

<input id="berat" placeholder="Berat badan (kg)">
<button onclick="hitungTarget()">Hitung Target</button>

<p id="targetInfo"></p>
</div>

<div class="card">
<h3>Tambah Makanan</h3>
<select id="makananSelect"></select>
<input id="jumlah" placeholder="Jumlah (gram)">
<button onclick="tambahDariDB()">Tambah</button>
</div>

<div class="card">
<h3>Log Harian</h3>
<table>
<thead><tr><th>Nama</th><th>Kalori</th><th>Protein</th></tr></thead>
<tbody id="list"></tbody>
</table>
</div>

<div class="card">
<h3>Total</h3>
<p id="totalKal"></p>
<div class="progress"><div id="barKal" class="bar"></div></div>

<p id="totalPro"></p>
<div class="progress"><div id="barPro" class="bar"></div></div>
</div>

<div class="card">
<h3>Meal Plan Otomatis</h3>
<button onclick="buatMeal()">Generate Meal Plan</button>
<div id="mealPlan"></div>
</div>

</div>

<script>

// DATABASE MAKANAN
const db = {
 "Nasi putih": {kal:130, pro:2.5},
 "Ayam dada": {kal:165, pro:31},
 "Telur": {kal:70, pro:6},
 "Tempe": {kal:190, pro:20},
 "Tahu": {kal:80, pro:8},
 "Ikan": {kal:206, pro:22},
 "Oatmeal": {kal:389, pro:17},
 "Susu": {kal:60, pro:3},

 // buah
 "Pisang": {kal:89, pro:1.1},
 "Apel": {kal:52, pro:0.3},
 "Jeruk": {kal:47, pro:0.9}
};

let data = JSON.parse(localStorage.getItem("data")) || [];
let targetKal = localStorage.getItem("targetKal") || 0;
let targetPro = localStorage.getItem("targetPro") || 0;

// dropdown
let select = document.getElementById("makananSelect");
for(let item in db){
 select.innerHTML += `<option value="${item}">${item}</option>`;
}

// HITUNG TARGET
function hitungTarget(){
 let berat = document.getElementById("berat").value;
 let mode = document.getElementById("mode").value;

 if(mode==="bulk"){
  targetKal = berat * 35;
  targetPro = berat * 2;
 } else {
  targetKal = berat * 25;
  targetPro = berat * 2.2;
 }

 localStorage.setItem("targetKal", targetKal);
 localStorage.setItem("targetPro", targetPro);

 document.getElementById("targetInfo").innerText =
  mode.toUpperCase()+" → "+targetKal+" kkal | "+targetPro+"g protein";

 update();
}

// TAMBAH MAKANAN
function tambahDariDB(){
 let nama = select.value;
 let gram = document.getElementById("jumlah").value;

 let kal = (db[nama].kal/100)*gram;
 let pro = (db[nama].pro/100)*gram;

 data.push({nama, kal, pro});
 save();
}

// SAVE
function save(){
 localStorage.setItem("data", JSON.stringify(data));
 render();
}

// RENDER
function render(){
 let list = document.getElementById("list");
 list.innerHTML="";

 data.forEach(i=>{
  list.innerHTML += `
  <tr>
    <td>${i.nama}</td>
    <td>${Math.round(i.kal)}</td>
    <td>${Math.round(i.pro)}</td>
  </tr>`;
 });

 update();
}

// UPDATE TOTAL
function update(){
 let totalKal = data.reduce((a,b)=>a+b.kal,0);
 let totalPro = data.reduce((a,b)=>a+b.pro,0);

 document.getElementById("totalKal").innerText="Kalori: "+Math.round(totalKal);
 document.getElementById("totalPro").innerText="Protein: "+Math.round(totalPro);

 document.getElementById("barKal").style.width =
  (targetKal ? (totalKal/targetKal)*100 : 0)+"%";

 document.getElementById("barPro").style.width =
  (targetPro ? (totalPro/targetPro)*100 : 0)+"%";
}

// MEAL PLAN
function buatMeal(){
 let mode = document.getElementById("mode").value;

 let meal = "";

 if(mode==="bulk"){
  meal = `
  <div class="meal">🍳 Pagi: Oatmeal + Susu + Pisang</div>
  <div class="meal">🍗 Siang: Nasi + Ayam + Telur</div>
  <div class="meal">🥩 Malam: Nasi + Ikan / Tempe</div>
  <div class="meal">🥤 Snack: Susu + Pisang</div>
  `;
 } else {
  meal = `
  <div class="meal">🍳 Pagi: Telur + Buah</div>
  <div class="meal">🍗 Siang: Ayam + Sayur</div>
  <div class="meal">🥩 Malam: Ikan + Sayur</div>
  <div class="meal">🥤 Snack: Apel / Jeruk</div>
  `;
 }

 document.getElementById("mealPlan").innerHTML = meal;
}

render();

</script>

</body>
</html>
